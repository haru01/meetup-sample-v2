pre-commit:
  parallel: true
  commands:
    backend-typecheck:
      glob: "backend/**/*.{ts,tsx}"
      run: ./scripts/run-quality.sh "cd backend && npx tsc --noEmit"
    frontend-typecheck:
      glob: "frontend/**/*.{ts,tsx}"
      run: ./scripts/run-quality.sh "cd frontend && npx tsc --noEmit"
    backend-lint:
      glob: "backend/**/*.{ts,tsx}"
      run: ./scripts/run-quality.sh "cd backend && npm run lint"
    frontend-lint:
      glob: "frontend/**/*.{ts,tsx}"
      run: ./scripts/run-quality.sh "cd frontend && npm run lint"
    prettier:
      glob: "**/*.{ts,tsx,js,json}"
      run: ./scripts/run-quality.sh "npx prettier --check {staged_files}"
    backend-tests:
      glob: "backend/**/*.{ts,tsx}"
      run: ./scripts/run-quality.sh "cd backend && npm test -- --run"
    frontend-tests:
      glob: "frontend/**/*.{ts,tsx}"
      run: ./scripts/run-quality.sh "cd frontend && npm test -- --run"
